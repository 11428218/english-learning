<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProLingual | Smart Vocabulary Learning</title>
    <meta
      name="description"
      content="ProLingual: 專注於大學生與專業學習者的英文單字學習平台，支援間隔重複、弱點追蹤與領域化學習。"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-a" aria-hidden="true"></div>
    <div class="bg-orb orb-b" aria-hidden="true"></div>

    <header class="site-header">
      <div class="brand">ProLingual</div>
      <a class="repo-link" href="https://github.com/" target="_blank" rel="noreferrer">GitHub</a>
    </header>

    <main class="hero-wrap">
      <section class="hero-card">
        <p class="chip">Language Learning MVP</p>
        <h1>有系統地背單字，而不是亂槍打鳥</h1>
        <p class="subtitle">
          ProLingual 針對認真學習者設計，結合間隔重複、弱點單字追蹤、領域詞彙與例句練習，讓學習節奏穩定可持續。
        </p>

        <div class="cta-row">
          <a class="btn btn-primary" href="https://github.com/" target="_blank" rel="noreferrer">查看原始碼</a>
          <a class="btn btn-ghost" href="#features">查看特色</a>
        </div>
      </section>

      <section id="features" class="features-grid">
        <article class="feature-item">
          <h2>間隔重複</h2>
          <p>依記憶曲線安排複習時間，減少忘記與重複無效練習。</p>
        </article>
        <article class="feature-item">
          <h2>弱點追蹤</h2>
          <p>自動標記常錯單字，優先排入複習，補強盲點。</p>
        </article>
        <article class="feature-item">
          <h2>領域化詞彙</h2>
          <p>支援一般、商務、電機與 TOEIC 等場景化學習範圍。</p>
        </article>
      </section>

      <section class="footer-note">
        <p>這個頁面部署於 GitHub Pages，可直接使用 https 連線。</p>
      </section>
    </main>
  </body>
</html>

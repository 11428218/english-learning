services:
  - type: web
    name: prolingual-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run build
    preDeployCommand: npm run db:setup
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: STRICT_PORT
        value: false
      - key: DB_SSL
        value: true
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: prolingual-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: FRONTEND_URLS
        sync: false

  - type: pserv
    name: prolingual-db
    plan: free
    ipAllowList: []

databases:
  - name: prolingual-db
    plan: free
    databaseName: prolingual
    user: prolingual_user

services:
  - type: web
    name: prolingual-backend
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: STRICT_PORT
        value: false
      - key: DB_SSL
        value: true
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: prolingual-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: FRONTEND_URLS
        sync: false
